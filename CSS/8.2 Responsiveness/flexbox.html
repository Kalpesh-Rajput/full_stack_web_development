<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Flexbox</title>
  <style>
    .flex-container {
      display: flex;
    }

    .card {
      background: rgb(148, 148, 163);
      border: 30px solid white;
      height: 100px;
      flex: 1;
    }

    .first {
      flex: 5;
    }

    .second {
      flex: 0.0;
    }
  </style>
</head>

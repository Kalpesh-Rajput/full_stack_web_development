<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    .red-circle{
      background-color: red;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      position: absolute;
      top: 250px;
      left: 50px;
    }
    .sec-circle{
      background-color: red;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      position: absolute;
      top: 0px;
      left: 290px;
    }
    .blue-box{
      background-color: blue;
      margin-top: 200px;
      margin-left: 200px; 
      width: 500px;
      height: 300px;
      position: relative;
    }
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
      <div class="sec-circle">
      </div>
    </div>
  </div>

</body>

</html>

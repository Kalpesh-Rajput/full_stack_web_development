<!-- HTML Iframes
An HTML iframe is used to display a web page within a web page.
 -->



<!DOCTYPE html>
<html>
<body>

<h2>HTML Iframes</h2>
<p>You can use the height and width attributes to specify the size of the iframe:</p>

<iframe src="./18_buttons.html" height="200" width="300" style="margin-bottom:20px;" title="Iframe Example"></iframe>
<br>
<br>
<br>
<iframe src="./09_images.html" style="height:200px; width:300px;" title="Iframe Example"></iframe>
<iframe src="./11_tables.html" style="border:dotted;" title="Example"></iframe>
<iframe src="./11_tables.html" style="border:3px solid red;" title="Iframe Example"></iframe>

<!-- Iframe - Target for a Link
An iframe can be used as the target frame for a link
The target attribute of the link must refer to the name attribute of the iframe: -->
<iframe src="./02_elements.html" name="iframe_a" title=""Example"></iframe>

<p><a href="https://www.w3schools.com" target="iframe_a"> W3school</a></p>

</body>
</html>



<!-- Chapter Summary
The HTML <iframe> tag specifies an inline frame
The src attribute defines the URL of the page to embed
Always include a title attribute (for screen readers)
The height and width attributes specify the size of the iframe
Use border:none; to remove the border around the iframe -->
